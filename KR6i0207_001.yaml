body:
  text: 後魏天竺三藏菩提流支譯如是我聞一時婆伽婆在王舍城迦蘭陀竹園與大比丘僧千二百五十人俱及大菩薩摩訶薩衆爾時摩伽陀國頻婆娑羅王出王舍城詣迦蘭陀竹園精舍至世尊所頭面禮足繞佛三匝退坐一面爾時世尊即告頻婆娑羅王言大王如人夢中見於衆人與諸婇女共相娛樂此人覺已憶念夢中衆人婇女大王於意云何如是夢中衆人婇女為有實不頻婆娑羅王答言不也世尊佛告大王於意云何是人夢中見婇女與諸人等共相娛樂覺已憶念如是之人寧有智不大王答言不也世尊何以故世尊夢中畢竟無有衆人及衆婇女衆人婇女尚不可得何況當有共相娛樂佛告大王凡夫之人亦復如是眼見美色便生愛著既生愛著便起欲心既起欲心起瞋癡業或作身業或作口業或作意業彼所作業作已而滅滅已不依東方而住亦復不依南方而住亦復不依西方而住亦復不依北方而住四維上下亦復如是至臨終時行識將滅其意現前大王如是行識自作之業必盡受之大王如人夢覺不見婇女及諸人衆行識滅已初識次生或生天中或生人中或生地獄或生畜生或生餓鬼大王以初識不斷自心相續應受報處而生其中大王觀諸生滅頗有一法從於今世至未來世大王如是行識終時名之為滅初識起時名之為生大王行識滅時去無所至初識生時無所從來何以故識性離故大王行識行識空滅時滅業空初識初識空生時生業空觀諸業果亦不失壞大王當知以初識心相續不斷而受果報爾時善逝説此語已而説頌曰一切唯名字唯住想分別名字分別説而説無所有以種種名字説於種種法法中無如是此法諸法相名字名字空名字離名字諸法無名字以名字而説此法非實有以分別而生彼分別亦無空以分別説一切凡夫説眼能見於色世間妄分別取之以為實佛之所説法衆緣集故見此是行次第為説第一義非眼見於色意不覺諸法此是第一諦非世間所覺爾時世尊説此經已摩伽陀國頻婆娑羅王一切世間天人阿修羅揵闥婆等聞佛所説皆大歡喜
